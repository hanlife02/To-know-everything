<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}内容摘要看板{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page">
      <header class="site-header">
        <div class="site-brand">
          <a class="site-title" href="{{ url_for('index') }}">内容摘要看板</a>
        </div>
        <nav class="site-nav">
          <a href="{{ url_for('index') }}" {% if active_page == "home" %}class="active"{% endif %}>首页</a>
          <a href="{{ url_for('notifications_page') }}" {% if active_page == "notifications" %}class="active"{% endif %}>推送设置</a>
          <a href="{{ url_for('llm_page') }}" {% if active_page == "llm" %}class="active"{% endif %}>模型设置</a>
          <a href="{{ url_for('debug_page') }}" {% if active_page == "debug" %}class="active"{% endif %}>调试入口</a>
          <a href="{{ url_for('bilibili_page') }}" {% if active_page == "bilibili" %}class="active"{% endif %}>哔哩哔哩</a>
          <a href="{{ url_for('materials_notices_page') }}" {% if active_page == "materials_notices" %}class="active"{% endif %}>材料学院通知</a>
          <a href="{{ url_for('xhs_page') }}" {% if active_page == "xhs" %}class="active"{% endif %}>小红书</a>
        </nav>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <section class="flash-list">
        {% for category, message in messages %}
        <article class="flash flash-{{ category }}">{{ message }}</article>
        {% endfor %}
      </section>
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
