<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bilibili 热门内容摘要</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Bilibili Popular Digest</p>
        <h1>热门内容摘要</h1>
        <p class="subtitle">页面直接输出摘要，每条内容都保留视频链接，适合快速浏览当天热门。</p>
      </section>

      <section class="panel overview">
        <div>
          <p class="panel-label">总览摘要</p>
          <p class="overview-text">{{ overview }}</p>
        </div>
        <div class="hero-meta">
          <p>更新时间</p>
          <strong>{{ updated_at }}</strong>
          <a href="{{ url_for('hot_api') }}" target="_blank" rel="noreferrer">查看 JSON</a>
        </div>
      </section>

      {% if error %}
      <section class="notice">
        {{ error }}
      </section>
      {% endif %}

      <section class="summary-list">
        {% for video in videos %}
        <article class="summary-item">
          <div class="summary-head">
            <span class="rank">#{{ video.rank }}</span>
            <h2>{{ video.title }}</h2>
          </div>
          <p class="summary-text">{{ video.summary }}</p>
          <p class="summary-link">
            视频链接：
            <a href="{{ video.url }}" target="_blank" rel="noreferrer">{{ video.url }}</a>
          </p>
        </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
